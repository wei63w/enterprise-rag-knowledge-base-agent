server:
  port: 8080

spring:
  application:
    name: enterprise-rag-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/rag_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:${MYSQL_PASSWORD:root123}}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

milvus:
  host: ${MILVUS_HOST:localhost}
  port: ${MILVUS_PORT:19530}
  collection: ${MILVUS_COLLECTION:document_chunks}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:rag-documents}

llm:
  default-model: ${LLM_DEFAULT_MODEL:qwen-plus}
  providers:
    openai:
      api-key: ${OPENAI_API_KEY:}
    qwen:
      api-key: ${QWEN_API_KEY:}
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}

rag:
  chunk:
    default-strategy: sliding-window
    fixed-length: 500
    overlap: 100
  retrieval:
    vector-top-k: 8
  memory:
    window-size: 5
    session-ttl-seconds: 3600
